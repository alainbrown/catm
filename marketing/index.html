<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafbfc" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f1115" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>catm — come and talk to me</title>
    <meta
      name="description"
      content="catm is a Chrome extension that reads any selection out loud. Long-form text-to-speech that runs entirely in your browser — no servers, no accounts, no telemetry."
    />
    <style>
      :root {
        --bg-0: #fafbfc;
        --bg-1: #ffffff;
        --bg-2: #f4f5f7;
        --border: #e6e8ec;
        --ink-0: #0d0e12;
        --ink-1: #2a2d35;
        --ink-2: #585d6b;
        --ink-3: #8c92a3;
        --ink-4: #b4b8c4;
        --accent: #5b6cff;
        --accent-end: #8a98ff;
        --accent-soft: #eef0ff;
        --accent-ink: #3b48cc;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-0: #0f1115;
          --bg-1: #161a21;
          --bg-2: #1c2129;
          --border: #2a303b;
          --ink-0: #f5f6f8;
          --ink-1: #d8dbe2;
          --ink-2: #9da3b1;
          --ink-3: #6c7283;
          --ink-4: #4a5060;
          --accent: #7a8aff;
          --accent-end: #a8b3ff;
          --accent-soft: rgba(122, 138, 255, 0.16);
          --accent-ink: #a8b3ff;
        }
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: "Inter Variable", "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
        color: var(--ink-1);
        background: var(--bg-0);
        background-image:
          radial-gradient(circle at 0% 0%, rgba(91, 108, 255, 0.10), transparent 50%),
          radial-gradient(circle at 100% 100%, rgba(255, 170, 140, 0.08), transparent 55%),
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'><circle cx='1' cy='1' r='1' fill='%23999' opacity='.16'/></svg>");
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex; flex-direction: column;
      }

      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1.1fr;
        align-items: center;
        gap: clamp(32px, 5vw, 80px);
        padding: clamp(48px, 8vh, 96px) clamp(28px, 5vw, 64px);
      }
      @media (max-width: 920px) {
        main {
          grid-template-columns: 1fr;
          gap: 48px;
          padding: 60px 24px;
          align-items: start;
        }
      }

      .brand {
        display: flex; flex-direction: column;
        gap: clamp(18px, 2.5vw, 28px);
        align-items: flex-start;
      }
      .brand .lockup {
        display: flex;
        align-items: center;
        gap: clamp(16px, 2vw, 28px);
      }
      .brand .mark {
        width: clamp(72px, 9vw, 116px);
        height: clamp(72px, 9vw, 116px);
        border-radius: clamp(18px, 2.6vw, 28px);
        background: linear-gradient(135deg, var(--accent), var(--accent-end));
        display: inline-flex; align-items: center; justify-content: center;
        color: white;
        font-weight: 800;
        font-size: clamp(42px, 5.5vw, 70px);
        letter-spacing: -0.06em;
        box-shadow:
          0 1px 0 rgba(255,255,255,0.2) inset,
          0 20px 50px -10px rgba(91, 108, 255, 0.48);
      }
      .brand .wordmark {
        font-size: clamp(72px, 11vw, 148px);
        font-weight: 800;
        letter-spacing: -0.05em;
        line-height: 0.88;
        color: var(--ink-0);
      }
      .brand .wordmark em {
        font-style: normal;
        background: linear-gradient(135deg, var(--accent), var(--accent-end));
        -webkit-background-clip: text; background-clip: text;
        color: transparent;
      }
      .brand .tagline {
        font-family: "JetBrains Mono Variable", "JetBrains Mono", ui-monospace, monospace;
        font-size: 12px;
        color: var(--ink-3);
        letter-spacing: 0.05em;
        display: flex; align-items: center; gap: 10px;
      }
      .brand .tagline::before {
        content: "";
        width: 22px; height: 1px;
        background: var(--ink-4);
      }
      .brand .sub {
        font-size: 15px;
        line-height: 1.5;
        color: var(--ink-2);
        max-width: 380px;
        letter-spacing: -0.005em;
      }

      .video-frame {
        position: relative;
        border-radius: 14px;
        overflow: hidden;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.4) inset,
          0 1px 2px rgba(13, 14, 18, 0.06),
          0 32px 80px -10px rgba(13, 14, 18, 0.22);
        background: var(--bg-1);
        border: 1px solid var(--border);
        aspect-ratio: 1280 / 800;
      }
      .video-frame video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .cta-row {
        display: flex; align-items: center; gap: 16px;
        flex-wrap: wrap;
      }
      .cta {
        display: inline-flex; align-items: center; gap: 10px;
        background: var(--accent); color: white;
        border: 1px solid var(--accent);
        font-size: 14.5px; font-weight: 600;
        padding: 13px 24px; border-radius: 11px;
        text-decoration: none; letter-spacing: -0.01em;
        box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 10px 28px rgba(91,108,255,0.35);
        transition: transform 0.15s, background 0.12s;
      }
      .cta:hover { background: var(--accent-ink); transform: translateY(-1px); }
      .cta svg { width: 16px; height: 16px; }
      .cta-note {
        font-family: "JetBrains Mono Variable", "JetBrains Mono", ui-monospace, monospace;
        font-size: 11.5px; color: var(--ink-3);
      }

      footer.mono {
        padding: 20px clamp(28px, 5vw, 64px) 28px;
        display: flex; align-items: center; justify-content: space-between;
        flex-wrap: wrap; gap: 12px;
        font-family: "JetBrains Mono Variable", "JetBrains Mono", ui-monospace, monospace;
        font-size: 11.5px;
        color: var(--ink-3);
      }
      footer.mono .sep { color: var(--ink-4); margin: 0 8px; }
      footer.mono a {
        color: var(--ink-2);
        text-decoration: none;
      }
      footer.mono a:hover { color: var(--accent); }
    </style>
  </head>
  <body>
    <main>
      <section class="brand">
        <div class="lockup">
          <span class="mark" aria-hidden="true">c</span>
          <h1 class="wordmark">cat<em>m</em></h1>
        </div>
        <div class="tagline">come and talk to me</div>
        <p class="sub">
          Right-click any text. The side panel reads it back to you in a natural voice. Synthesis
          runs locally — nothing leaves your machine.
        </p>
        <div class="cta-row">
          <a class="cta" href="https://chromewebstore.google.com/detail/imkogmgncjobcjeofjeekegihcikgbbm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="21.17" y1="8" x2="12" y2="8"/><line x1="3.95" y1="6.06" x2="8.54" y2="14"/><line x1="10.88" y1="21.94" x2="15.46" y2="14"/></svg>
            Add to Chrome
          </a>
          <span class="cta-note">free · open source · 100% local</span>
        </div>
      </section>

      <section class="video-frame" aria-label="catm demo">
        <video autoplay muted playsinline loop poster="./demo-poster.png">
          <source src="./demo.mp4" type="video/mp4" />
        </video>
      </section>
    </main>

    <footer class="mono">
      <span>© 2026 <span class="sep">·</span> MIT <span class="sep">·</span> Alain Brown</span>
      <span>
        <a href="https://github.com/alainbrown/catm">github</a>
        <span class="sep">·</span>
        <a href="https://github.com/alainbrown/catm/issues">issues</a>
      </span>
    </footer>
  </body>
</html>
