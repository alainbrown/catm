# Runs unit tests (Vitest) and the full Playwright e2e suite on every push
# and pull request.
#
# Runner choice: ubuntu-latest with Mesa's lavapipe software Vulkan driver.
# GitHub-hosted macOS runners (macos-14/15) do not expose a GPU — Metal
# passthrough is not implemented (see actions/runner-images#7085). The only
# free-tier CI path with usable WebGPU is Linux + lavapipe (software Vulkan).
# It's a software rasterizer, so synthesis is still slower than a real GPU,
# but materially faster than WASM fallback. playwright.config.ts already
# passes the matching Vulkan flags (--use-angle=default, --enable-features=
# SharedArrayBuffer,Vulkan, --enable-unsafe-webgpu, --disable-vulkan-surface).

name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Mesa lavapipe (software Vulkan for WebGPU)
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Unit tests
        run: npm test
      - name: E2E tests
        run: npm run e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
